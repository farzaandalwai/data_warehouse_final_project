# =============================================================================
# docker-compose.yml
# Wholesale Electricity Market Stress and Price Spike Forecasting
# =============================================================================
#
# Services
#   postgres      — Airflow metadata database (postgres:13)
#   mlflow        — MLflow tracking server   → http://localhost:5001
#   airflow-init  — One-shot DB migrate + admin user creation
#   airflow       — Scheduler + webserver combined → http://localhost:8080
#   airflow-cli   — Optional debug shell (profile: debug)
#
# Credentials: loaded from .env (gitignored — never committed)
#
# Start : docker compose up -d
# Stop  : docker compose down
# Logs  : docker compose logs -f airflow
# Debug : docker compose --profile debug run --rm airflow-cli
# =============================================================================


# ---------------------------------------------------------------------------
# YAML anchor — shared config reused by all Airflow services
# ---------------------------------------------------------------------------
x-airflow-common:
  &airflow-common
  build: .
  env_file:
    - .env                            # Snowflake + EIA credentials — never hardcoded
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__SECRET_KEY: temporary_class_project_secret
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # dbt reads this to locate profiles.yml inside the container
    DBT_PROFILES_DIR: /opt/airflow/dbt_profiles
    # MLflow tracking server (same port the mlflow service listens on internally)
    MLFLOW_TRACKING_URI: http://mlflow:5001
    # Add project root to PYTHONPATH so DAG imports (scripts.*, dbt.*) resolve
    PYTHONPATH: /opt/airflow
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./dbt/electricity_market:/opt/airflow/dbt/electricity_market
    - ./dbt/profiles:/opt/airflow/dbt_profiles
    - ./logs:/opt/airflow/logs
    - ./mlruns:/opt/airflow/mlruns


# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # --------------------------------------------------------------------------
  # postgres — Airflow metadata database
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:13
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # mlflow — experiment tracking UI at http://localhost:5001
  # Uses the official MLflow image with SQLite backend (class-project scale).
  # Artifacts are stored in the named volume and bind-mounted to ./mlruns.
  # --------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    restart: unless-stopped
    command:
      - mlflow
      - server
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --artifacts-destination
      - /mlflow/artifacts
      - --serve-artifacts
      - --host
      - "0.0.0.0"
      - --port
      - "5001"
    ports:
      - "5001:5001"
    volumes:
      - mlflow-data:/mlflow
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --------------------------------------------------------------------------
  # airflow-init — runs once; migrates DB and creates admin user.
  # Uses entrypoint /bin/bash so the command list is ["-c", "<script>"].
  # The | block scalar preserves newlines, and \ continues the users create
  # flags across lines — bash reads them as one command.
  # `|| true` makes user creation idempotent (safe to re-run).
  # --------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    restart: "no"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    depends_on:
      postgres:
        condition: service_healthy

  # --------------------------------------------------------------------------
  # airflow — scheduler + webserver in one container (class-project setup).
  # Scheduler runs in the background (&); webserver runs in the foreground.
  # Login: admin / admin  → http://localhost:8080
  # --------------------------------------------------------------------------
  airflow:
    <<: *airflow-common
    restart: always
    command:
      - bash
      - -c
      - airflow scheduler & airflow webserver
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # --------------------------------------------------------------------------
  # airflow-cli — optional debug shell; only starts with --profile debug.
  # Usage: docker compose --profile debug run --rm airflow-cli bash
  # --------------------------------------------------------------------------
  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    restart: "no"
    entrypoint: /bin/bash
    command:
      - -c
      - echo "Airflow CLI ready. Run airflow commands interactively."


# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  postgres-db-volume:
  mlflow-data:
